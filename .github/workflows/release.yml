# Publishes to PyPI via Trusted Publishing (OIDC) — no long-lived tokens anywhere.
#
# One-time setup on PyPI (account owner): Manage project -> Publishing ->
# add GitHub publisher: owner Anvay-Sanil, repo token-xray,
# workflow release.yml, environment pypi.
#
# Release flow: create a GitHub Release (tag vX.Y.Z) -> this workflow builds,
# tests, checks metadata, and uploads.

name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: test_history_hygiene.py scans every revision and
          # false-fails on shallow clones.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          python -m pytest -q
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
